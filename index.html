<!DOCTYPE html>
<html>
<head>
  <title>Ashok Gol Gappe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="light">

<img src="logo.png" class="logo">

<h1 id="shopTitle">MY SHOP</h1>

<!-- STATUS -->
<div id="statusLight"></div>
<h2 id="statusText"></h2>
<p id="timeText"></p>

<!-- OWNER LOGIN -->
<div id="loginBox">
  <input type="password" id="password" placeholder="Owner Password">
  <button onclick="login()">Login</button>
</div>
  
<div id="loginBox">
  <input type="password" id="pinInput" placeholder="Enter Admin PIN" />
  <button onclick="loginAdmin()">Admin Login</button>
</div>

  <div id="adminPanel" style="display:none;">
  <button onclick="requireAdmin(setOpen)">Open Shop</button>
  <button class="close" onclick="requireAdmin(setClosed)">Close Shop</button>
  <button class="today" onclick="requireAdmin(setClosedToday)">Closed Today</button>
</div>


<!-- OWNER CONTROLS -->
<div class="buttons" id="controls" style="display:none;">
  <button onclick="setOpen()">OPEN</button>
  <button onclick="setClosed()">CLOSE</button>
  <button onclick="setClosedToday()">CLOSED TODAY</button>
</div>

<!-- TOGGLES -->
<div class="buttons">
  <button onclick="toggleDark()">🌙 Dark</button>
  <button onclick="toggleLang()">🌐 Language</button>
</div>

  <!-- premium layout card -->
  <div class="card">
  </div>

<!-- BRANCHES -->
<h3 id="branchTitle">📍 Our Branches</h3>
<select onchange="changeMap(this.value)">
  <option value="Ludhiana+Punjab+India">Ludhiana</option>
  <option value="Chandigarh+India">Chandigarh</option>
</select>

<iframe id="map" class="map"></iframe>

<!-- VISIT COUNTER -->
<p id="visits"></p>

<script src="script.js"></script>
</body>
</html>
