<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop Status</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="overlay"></div>

  <div class="container">
    <img src="logo.png" class="logo" alt="Shop Logo">

    <h1 id="shopName">Your Shop Name</h1>

    <h2 id="statusText">Loading status...</h2>
    <div id="statusIcon">🍴</div>

    <!-- Admin Login -->
    <div class="loginBox">
      <input type="password" id="pinInput" placeholder="Admin PIN">
      <button id="loginBtn">Admin Login</button>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel">
      <button onclick="setOpen()">Open</button>
      <button class="close" onclick="setClosed()">Close</button>
      <button class="today" onclick="setClosedToday()">Closed Today</button>

      <h3>Blocked Devices</h3>
      <ul id="blockedList"></ul>

      <button class="reset" onclick="resetBlocks()">Unblock All</button>
    </div>

    <button class="darkBtn" onclick="toggleDark()">🌙 Toggle Theme</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
