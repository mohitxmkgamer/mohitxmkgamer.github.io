<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shop Status</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="light">

  <img src="logo.png" class="logo" alt="Shop Logo">

  <div class="card">
    <!-- SHOP NAME -->
    <h1 id="shopName">Your Shop Name</h1>

    <!-- STATUS -->
    <h2 id="statusText">Checking status...</h2>
    <div id="statusLight"></div>

    <!-- Admin Login -->
    <div id="loginBox">
      <input type="password" id="pinInput" placeholder="Admin PIN">
      <button onclick="loginAdmin()">Admin Login</button>
    </div>

    <!-- Admin Controls -->
    <div id="adminPanel" style="display:none;">
      <button onclick="requireAdmin(setOpen)">Open Shop</button>
      <button class="close" onclick="requireAdmin(setClosed)">Close Shop</button>
      <button class="today" onclick="requireAdmin(setClosedToday)">Closed Today</button>
    </div>

    <!-- Customer Buttons -->
    <button onclick="toggleDark()">🌙 Toggle Dark Mode</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
