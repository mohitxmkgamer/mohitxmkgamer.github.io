<!DOCTYPE html>
<html>
<head>
  <title>My Shop Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body class="light">

<!-- LOGO -->
<img src="logo.png" alt="Shop Logo" class="logo">

<h1>MY SHOP</h1>

<!-- STATUS LIGHT -->
<div id="statusLight"></div>
<h2 id="statusText"></h2>
<p id="timeText"></p>

<!-- CONTROL BUTTONS -->
<div class="buttons" id="controls" style="display:none;">
  <button onclick="setOpen()">OPEN</button>
  <button onclick="setClosed()">CLOSE</button>
  <button onclick="setClosedToday()">CLOSED TODAY</button>
</div>

<button onclick="unlockControls()">🔒 Owner Login</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>

<!-- MAP -->
<h3>📍 Our Branches</h3>

<select onchange="changeMap(this.value)">
  <option value="Ludhiana+Punjab+India">Ludhiana</option>
  <option value="Chandigarh+India">Chandigarh</option>
</select>

<iframe
  id="map"
  class="map"
  loading="lazy">
</iframe>

<script src="script.js"></script>
</body>
</html>
