<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop Status</title>
  <!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.8.0/firebase-analytics.js"></script>
  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyAe1dKc-nmQvd0MZMCyLjRGUsda5xsLU7g",
    authDomain: "my-shop-afc91.firebaseapp.com",
    databaseURL: "https://my-shop-afc91-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "my-shop-afc91",
    storageBucket: "my-shop-afc91.firebasestorage.app",
    messagingSenderId: "45936806412",
    appId: "1:45936806412:web:5b320e5dfd4d6e38c63c29"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
</script>

  <link rel="stylesheet" href="style.css">
  
  <h1 id="shopName">🍴 My Food Shop</h1>

<div id="status" class="status checking">
  Checking status...
</div>

  <script>
  const statusDiv = document.getElementById("status");

  db.ref("shopStatus").on("value", snapshot => {
    const status = snapshot.val();

    statusDiv.className = "status";
    statusDiv.textContent = status;

    if (status === "OPEN") statusDiv.classList.add("open");
    if (status === "CLOSED") statusDiv.classList.add("closed");
    if (status === "OPENING_SOON") statusDiv.classList.add("soon");
  });
</script>

</head>
<body>
  <div class="overlay"></div>

  <div class="container">
    <h1 id="shopName">🍽️ Ashok Gol Gappe</h1>

    <div id="statusIcon">🍴</div>
    <h2 id="statusText">Checking status...</h2>

    <!-- ADMIN LOGIN -->
    <div class="loginBox">
      <input id="usernameInput" placeholder="Admin Username">
      <input id="passwordInput" type="password" placeholder="Admin Password">
      <button id="loginBtn">Admin Login</button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel">
      <h3>Admin Controls</h3>

      <button onclick="setStatus('open')">Open</button>
      <button onclick="setStatus('closed')" class="close">Closed</button>
      <button onclick="setStatus('closedToday')" class="today">Closed Today</button>
      <button onclick="setStatus('openingSoon')">Opening Soon</button>
      <button onclick="setStatus('closingSoon')">Closing Soon</button>
      <button onclick="resetAuto()" class="reset">Reset to Auto</button>

      <h3>Blocked Devices</h3>
      <ul id="blockedList"></ul>
      <button onclick="clearBlocks()" class="reset">Unblock All</button>
    </div>
  </div>
  
<div class="admin">
  <button onclick="setStatus('OPEN')">Open</button>
  <button onclick="setStatus('CLOSED')">Closed</button>
  <button onclick="setStatus('OPENING_SOON')">Opening Soon</button>
</div>

  <script>
  function setStatus(value) {
    db.ref("shopStatus").set(value);
  }
</script>


  <script src="script.js"></script>
</body>
</html>
