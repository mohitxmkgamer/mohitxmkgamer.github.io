<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .box {
      text-align: center;
      padding: 30px;
      border-radius: 16px;
      background: #020617;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
      width: 90%;
      max-width: 400px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #status {
      font-size: 22px;
      margin: 20px 0;
    }

    button {
      padding: 12px 20px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .open {
      background: #22c55e;
      color: black;
    }

    .close {
      background: #ef4444;
      color: white;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🍴 My Shop</h1>
    <div id="status">Checking status…</div>

    <button class="open" onclick="setStatus('OPEN')">Open</button>
    <button class="close" onclick="setStatus('CLOSED')">Close</button>
  </div>

  <script>
    const statusDiv = document.getElementById("status");

    function loadStatus() {
      const saved = localStorage.getItem("shopStatus");
      if (saved) {
        statusDiv.innerText = "Status: " + saved;
      } else {
        statusDiv.innerText = "Status: OPEN";
        localStorage.setItem("shopStatus", "OPEN");
      }
    }

    function setStatus(value) {
      localStorage.setItem("shopStatus", value);
      statusDiv.innerText = "Status: " + value;
    }

    loadStatus();
  </script>

</body>
</html>
